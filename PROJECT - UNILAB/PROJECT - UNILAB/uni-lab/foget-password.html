<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="./css/foget-password.css">
</head>
<body>

<div class="container">
  <div class="card">
    <h2>Forgot Your Password?</h2>
    <p>Enter your email and we'll send you a reset code.</p>

    <form id="resetForm">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="Enter your email">

      <span class="error" id="error"></span>

      <button type="submit" id="btn">
        Send Code
      </button>
    </form>

    <p class="success" id="success"></p>

    <a href="./Sign-in.html" class="back">Back to Sign In</a>
  </div>
</div>

<script src="./js/foget-password.js"></script>
</body>
</html>
